<!DOCTYPE html>
<html>
<head>
    <title>OG Market Dashboard</title>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0,255,255,0.7);
        }

        .buy {
            color: lime;
            font-weight: bold;
        }

        .sell {
            color: red;
            font-weight: bold;
        }

        .bullish {
            color: cyan;
        }

        .bearish {
            color: orange;
        }
    </style>

    <!-- AUTO REFRESH EVERY 30 SEC -->
    <script>
        setTimeout(() => {
            location.reload();
        }, 30000);
    </script>

</head>

<body>

<h1>🚀 OG Market Dashboard</h1>

<div class="container">

{% for item in data %}
<div class="card">

    <h2>{{ item.asset }}</h2>

    <p>💰 Price: {{ item.price }}</p>
    <p>📊 Change: {{ item.change }}%</p>

    <p class="{% if item.trend == 'Bullish' %}bullish{% else %}bearish{% endif %}">
        {{ item.trend }}
    </p>

    <p>
        {{ item.risk }} RISK
    </p>

    <h3 class="{% if item.signal == 'BUY' %}buy{% else %}sell{% endif %}">
        {{ item.signal }} SIGNAL
    </h3>

</div>
{% endfor %}

</div>

</body>
</html>
