<!DOCTYPE html>
<html>
<head>
    <title>OG Market Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 280px;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0,255,255,0.7);
        }

        .buy { color: lime; font-weight: bold; }
        .sell { color: red; font-weight: bold; }
        .hold { color: yellow; font-weight: bold; }

        .bullish { color: cyan; }
        .bearish { color: orange; }
    </style>

    <!-- AUTO REFRESH -->
    <script>
        setTimeout(() => {
            location.reload();
        }, 30000);
    </script>

</head>

<body>

<h1>🚀 OG Market Dashboard</h1>

<div class="container">

{% for item in data %}
<div class="card">

    <h2>{{ item.asset }}</h2>

    <p>💰 Price: {{ item.price }}</p>
    <p>📊 Change: {{ item.change }}%</p>
    <p>📉 RSI: {{ item.rsi }}</p>

    <p class="{% if item.trend == 'Bullish' %}bullish{% else %}bearish{% endif %}">
        {{ item.trend }}
    </p>

    <p>{{ item.risk }} RISK</p>

    <h3 class="{% if item.signal == 'BUY' %}buy{% elif item.signal == 'SELL' %}sell{% else %}hold{% endif %}">
        {{ item.signal }} SIGNAL
    </h3>

    <!-- CHART -->
    <canvas id="chart{{ loop.index }}"></canvas>

    <script>
        const ctx{{ loop.index }} = document.getElementById('chart{{ loop.index }}');

        new Chart(ctx{{ loop.index }}, {
            type: 'line',
            data: {
                labels: {{ range(item.chart|length) | list }},
                datasets: [{
                    label: "{{ item.asset }}",
                    data: {{ item.chart }},
                    borderWidth: 2,
                    tension: 0.3
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { display: false } }
            }
        });
    </script>

</div>
{% endfor %}

</div>

</body>
</html>
