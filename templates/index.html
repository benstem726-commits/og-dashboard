<!DOCTYPE html>
<html>
<head>
    <title>OG Market Dashboard</title>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #111827;
            padding: 20px;
            margin: 10px;
            border-radius: 15px;
            width: 200px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px cyan;
        }

        .buy { color: lime; }
        .sell { color: red; }

        #chartModal {
            display:none;
            position:fixed;
            top:10%;
            left:10%;
            width:80%;
            height:70%;
            background:#000;
        }
    </style>
</head>

<body>

<h1>🚀 OG Market Dashboard</h1>
<h2>{{ summary }}</h2>

{% if best_trade %}
<div style="background:lime; padding:10px; color:black;">
🔥 Best Trade: {{ best_trade.asset }} ({{ best_trade.signal }})
</div>
{% endif %}

<br>

<input type="text" id="search" placeholder="Search..." onkeyup="searchAsset()">
<div id="searchResults"></div>

<div class="cards">
{% for item in data %}
<div class="card" onclick="openChart('{{ item.asset }}')">
    <h3>{{ item.asset }}</h3>
    <p>💰 {{ item.price }}</p>
    <p>📊 {{ item.change }}%</p>
    <p>RSI: {{ item.rsi }}</p>
    <p class="{{ 'buy' if 'BUY' in item.signal else 'sell' }}">
        {{ item.signal }}
    </p>
</div>
{% endfor %}
</div>

<div id="chartModal">
    <div id="chartContainer" style="height:100%"></div>
</div>

<script>
async function searchAsset() {
    let q = document.getElementById("search").value;
    let res = await fetch(/search?q=${q});
    let data = await res.json();

    document.getElementById("searchResults").innerHTML =
        data.map(a => <div>${a}</div>).join("");
}

async function openChart(asset) {
    document.getElementById("chartModal").style.display = "block";

    const chart = LightweightCharts.createChart(
        document.getElementById("chartContainer"),
        { width: 800, height: 400 }
    );

    const candleSeries = chart.addCandlestickSeries();

    let res = await fetch(/predict/${asset});
    let data = await res.json();

    let candles = data.chart.map((v, i) => ({
        time: i,
        open: v * 0.99,
        high: v * 1.01,
        low: v * 0.98,
        close: v
    }));

    candleSeries.setData(candles);
}
</script>

</body>
</html>
