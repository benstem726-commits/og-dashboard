<!DOCTYPE html>
<html>
<head>
<title>OG Market Dashboard</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
    background:#0b1220;
    color:white;
    text-align:center;
    font-family:Arial;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#111827;
    padding:15px;
    margin:10px;
    border-radius:12px;
    width:180px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px cyan;
}

#chartModal {
    display:none;
    position:fixed;
    top:5%;
    left:5%;
    width:90%;
    height:80%;
    background:#000;
}
</style>
</head>

<body>

<h1>🚀 OG Market Dashboard</h1>
<h2>{{ summary }}</h2>

{% if best_trade %}
<div style="background:lime; color:black; padding:10px;">
🔥 Best Trade: {{ best_trade.asset }} ({{ best_trade.signal }})
</div>
{% endif %}

<br>

<input type="text" id="search" placeholder="Search..." onkeyup="searchAsset()">
<div id="searchResults"></div>

<div class="cards">
{% for item in data %}
<div class="card" onclick="openChart('{{ item.asset }}')">
    <h3>{{ item.asset }}</h3>
    <p>💰 {{ item.price }}</p>
    <p>📊 {{ item.change }}%</p>
    <p>RSI: {{ item.rsi }}</p>

    <p style="
    color:
    {% if 'BUY' in item.signal %}lime
    {% elif 'SELL' in item.signal %}red
    {% else %}orange
    {% endif %}
    ">
    {{ item.signal }}
    </p>
</div>
{% endfor %}
</div>

<div id="chartModal">
    <div id="chartContainer" style="height:100%"></div>
</div>

<script>
async function searchAsset(){
    let q=document.getElementById("search").value;
    let res=await fetch(/search?q=${q});
    let data=await res.json();
    document.getElementById("searchResults").innerHTML =
        data.map(a=><div>${a}</div>).join("");
}

async function openChart(asset){
    document.getElementById("chartModal").style.display="block";

    const chart = LightweightCharts.createChart(
        document.getElementById("chartContainer"),
        { width:900, height:500 }
    );

    const candleSeries = chart.addCandlestickSeries();

    let res = await fetch(/predict/${asset});
    let data = await res.json();

    candleSeries.setData(data.chart);
}
</script>

</body>
</html>
